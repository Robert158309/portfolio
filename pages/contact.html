<!DOCTYPE html>

<html lang = "es-GT">

	<head>

		<meta charset = "utf-8">

		<meta name = "viewport" content = "width=device-width, initial-scale=1">

		<title>Contactame | Roberto</title>

		<link rel = "stylesheet" type = "text/css" href = "../styles/contact.css">
		<link rel = "stylesheet" type = "text/css" href = "../styles/base.css">
		<link rel = "stylesheet" type = "text/css" href = "../styles/layout.css">
		<link rel = "stylesheet" type = "text/css" href = "../styles/animations.css">

		<link rel = "icon" type = "image/png" href = "../assets/img/icons/user-icon.png">

		<script src = "../js/ui.js" defer></script>
		<script src = "../js/contact.js" defer></script>
		<script src = "../js/navigation.js" defer></script>

	</head>

	<body class = "contact-page">

		<button id = "menu-toggle" class = "menu-toggle">☰</button>

		<div class = "a-bg"></div>

        <!-- NAVBAR -->
        <nav id = "navbar" class = "navbar">

            <a href = "../index.html#home" class = "nav-link">Inicio</a>
            <a href = "../index.html#skills" class = "nav-link">Habilidades</a>
            <a href = "../index.html#projects" class = "nav-link">Proyectos</a>
            <a href = "../index.html#certifications" class = "nav-link">Certificaciones</a>
            <a href = "../index.html#about-section" class = "nav-link">Acerca De</a>
            <a href = "../index.html#contact-section" class = "nav-link">Contacto</a>

        </nav>

		<main>

			<section class = "contact-layout">

				<aside>

					<img src = "../assets/img/contact-img.webp" alt = "Imagen" class = "contact-img">

				</aside>

				<section>

					<fieldset>

						<legend>Hablemos 😄</legend>

						<form action = "https://formspree.io/f/xjgzkrzd" method = "POST" novalidate>

							<input type = "text" name = "nombre" placeholder = "Tu nombre" required>

							<input type = "email" name = "correo" placeholder = "Tu correo" required>

							<textarea name = "mensaje" placeholder = "Escribe tu mensaje..." required></textarea>

							<button type = "submit">Enviar mensaje</button>

						</form>

					</fieldset>

				</section>

			</section>

		</main>

		<footer>
			Roberto Monzón © 2026 • Hecho con café, bugs y decisiones cuestionables
		</footer>

		<div id = "form-toast"></div>

	</body>

</html>
