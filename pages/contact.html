<!DOCTYPE html>

<html lang = "es-GT">

	<head>

		<meta charset = "utf-8">

		<meta name = "viewport" content = "width=device-width, initial-scale=1">

		<title>Contactame</title>

		<link rel = "stylesheet" type = "text/css" href = "../styles/contact.css">
		<link rel = "stylesheet" type = "text/css" href = "../styles/base.css">

		<link rel="icon" type="image/png" href="../assets/img/user-icon.png">

		<script src = "../js/contact.js" defer></script>

	</head>

	<body class = "contact-page">

		<nav class = "contact-navbar">
			<a href = "../index.html#home" class = "nav-link">Inicio</a>
            <a href = "../index.html#skills" class = "nav-link not-active">Habilidades</a>
            <a href = "../index.html#projects" class = "nav-link">Proyectos</a>
            <a href = "../index.html#certifications" class = "nav-link not-active">Certificaciones</a>

            <a href = "../index.html#contact-section" class = "nav-link not-active">Contacto</a>
		</nav>

		<main>

			<section class = "contact-layout">

				<aside>

					<img src = "../assets/img/contact-img.png" alt = "Imagen" class = "contact-img">

				</aside>

				<section>

					<fieldset>

						<legend>Hablemos 😄</legend>

						<form action = "https://formspree.io/f/xjgzkrzd" method = "POST" novalidate>

							<input type = "text" name = "nombre" placeholder = "Tu nombre" required>

							<input type = "email" name = "correo" placeholder = "Tu correo" required>

							<textarea name = "mensaje" placeholder = "Escribe tu mensaje..." required></textarea>

							<button type = "submit">Enviar mensaje</button>

						</form>

					</fieldset>

				</section>

			</section>

		</main>

		<footer>
			Roberto Monzón © 2026 • Hecho con café, bugs y decisiones cuestionables
		</footer>

		<div id = "form-toast"></div>

	</body>

</html>
